services:
  mysql:
    image: mysql:8.0
    container_name: interviewace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: interviewace
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: interviewace-api
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: interviewace
      JWT_SECRET: change-this-secret
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_PROVIDER: gemini
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: interviewace-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
  uploads:
